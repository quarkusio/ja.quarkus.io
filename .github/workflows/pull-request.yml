name: pull-request

on: pull_request_target

jobs:
  deploy:
    name: Deploy localized site preview to surge.sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Checkout merged commit to 'merged' dir
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: merged
          submodules: recursive

      - name: Copy l10n dir
        run: |
          rm -rf l10n
          cp -r merged/l10n ./

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Cache bundle directory
        uses: actions/cache@v3
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gem-${{ hashFiles('**/Gemfile.lock') }}

      - name: Cache tsuji.jar
        uses: actions/cache@v4
        with:
          path: vendor/tsuji
          key: ${{ runner.os }}-tsuji-${{ hashFiles('merged/config/application.yaml') }}

      - name: Setup build env
        run: bin/setup-build-env-on-ubuntu

      - name: Restore mtime
        run: |
          cd upstream
          git restore-mtime

      - name: Build for preview
        run: ./tsujiw jekyll build --additional-configs=_config-preview.yml

      - name: Reduce the size of the website to be compatible with surge
        run: |
          cd upstream
          find assets/images/posts/ -mindepth 1 -maxdepth 1 -type d -mtime +100 -exec rm -rf ../docs/{} \;
          find newsletter/ -mindepth 1 -maxdepth 1 -type d -mtime +100 -exec rm -rf ../docs/{} \;
          rm -rf ../docs/assets/images/worldtour/2023
          rm -rf ../docs/assets/images/desktopwallpapers

      - name: Load Configuration
        id: config
        run: |
          SURGE_DOMAIN_SUFFIX=$(./tsujiw config get tsuji.jekyll.surge-domain-suffix)
          echo "surge_domain_suffix=${SURGE_DOMAIN_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Deploy to surge
        run: |
          surge docs pr-preview-${{ github.event.pull_request.number }}-${SURGE_DOMAIN_SUFFIX}
        env:
          SURGE_DOMAIN_SUFFIX: ${{ steps.config.outputs.surge_domain_suffix }}
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      - name: Add comment
        uses: actions/github-script@v7
        with:
          script: |
            const suffix = "${{ steps.config.outputs.surge_domain_suffix }}";
            let body = `Site preview(ja): https://pr-preview-${{ context.issue.number }}-${suffix}`
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
