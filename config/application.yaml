quarkus:
  config:
    locations: config/application.local.yaml

tsuji:
  jar: https://github.com/doc-l10n-kit/tsuji/releases/download/v0.8.15/tsuji.jar

  language:
    from: en
    to: ja

  rag:
    index-path: l10n/rag/index

  po:
    base-dir: l10n/po/ja_JP

  translator:
    type: deepl

    target-directories:
      - _guides
      - _posts
      - _versions
      - _data
      - _includes
      - _layouts
      - _redirects

    gemini:
      model: gemini-3-flash-preview
      prompts:
        system-prompt: "config/prompts/translation-system-prompt.txt"

    note:
      heading: "This is a heading. Translate using nominal phrase style (体言止め) appropriate for Japanese headings."

  jekyll:
    source-dir: upstream
    override-dir: l10n/override/ja_JP
    destination-dir: docs
    cname: ja.quarkus.io
    surge-domain-suffix: ja-quarkusio.surge.sh
    jekyll-l10n-branch: dev

    extract:
      yaml:
        exclude:
          - _data/authors.yaml
          - _data/languages.yaml
          - _data/publications.yaml
          - _data/versions.yaml

      html:
        include:
          - _includes/about.html
          - _includes/ai-blueprints.html
          - _includes/ai-chainofthought.html
          - _includes/ai-contextualrag.html
          - _includes/ai-frozenrag.html
          - _includes/ai-java-for-ai.html
          - _includes/ai-overview.html
          # - _includes/ai-quarkus-for-ai.html  # Temporarily excluded due to malformed HTML (upstream issue)
          # - _includes/benefactors.html  # Temporarily excluded due to malformed HTML (upstream issue)
          - _includes/catalog-detail-band.html
          - _includes/catalog-index-band.html
          - _includes/CF-footerband.html
          - _includes/container-first.html
          - _includes/developer-joy.html
          # - _includes/discussion.html  # Temporarily excluded due to malformed HTML (upstream issue)
          - _includes/events-discussions-band.html
          - _includes/feedback-community-band.html
          - _includes/get-started-band.html
          - _includes/get-started-band-lightblue.html
          - _includes/get-started-code-steps.html
          - _includes/header-navigation.html
          - _includes/homepage-ai-band.html
          - _includes/homepage-commonhaus-band.html
          - _includes/homepage-container_first-band.html
          - _includes/homepage-developer_joy-band.html
          - _includes/homepage-extensions-band.html
          - _includes/homepage-features-band.html
          - _includes/homepage-features-icon-band.html
          - _includes/homepage-hero-band.html
          - _includes/homepage-hero-band-ssjprime.html
          - _includes/homepage-hero-newrelease-band.html
          - _includes/homepage-imperative_and_reactive-band.html
          - _includes/homepage-performance-band.html
          - _includes/homepage-userstory-callout.html
          - _includes/homepage-worldtour-band.html
          - _includes/insights-band.html
          - _includes/kubernetes-native.html
          - _includes/newsletter-band.html
          - _includes/performance.html
          - _includes/project-footer.html
          - _includes/publication-entries.html
          # - _includes/spring-features-band.html  # Temporarily excluded due to malformed HTML (upstream issue)
          - _includes/spring-migrate-books.html
          # - _includes/spring-migrate-main.html  # Temporarily excluded due to malformed HTML (upstream issue)
          - _includes/spring-userstory-callout.html
          - _includes/standards.html
          - _includes/support-help-band.html
          - _includes/support-options-band.html
          - _includes/training-band.html
          - _includes/userstories-band.html
          - _includes/working-group-band.html
          - _includes/worldtour-abstracts.html
          - _includes/worldtour-code.html
          - _layouts/quarkus3.html


  # Glossary configuration
  # Ensures consistent terminology regardless of RAG search results
  glossary:
    enabled: true
    entries:
      # Core concepts
      - term: "dev mode"
        translation: "開発モード"
      - term: "extension"
        translation: "エクステンション"
      - term: "annotation"
        translation: "アノテーション"
      - term: "bean"
        translation: "Bean"
      - term: "qualifier"
        translation: "修飾子"
      - term: "buildtime"
        translation: "ビルド時"
      - term: "augmentation"
        translation: "オーグメンテーション"
      - term: "reaugmentation"
        translation: "再オーグメンテーション"
      - term: "executable"
        translation: "実行可能ファイル"

      # ORM
      - term: "dialect"
        translation: "Dialect"
        #context: "Hibernate ORM"  # requires tsuji >= 0.9.0

      # Configuration
      - term: "configuration mapping"
        translation: "設定マッピング"
      - term: "configuration property"
        translation: "設定プロパティー"
      - term: "config property"
        translation: "設定プロパティー"
      - term: "extension method"
        translation: "拡張メソッド"

      # Container
      - term: "Container Image"
        translation: "コンテナーイメージ"

      # Security - Authentication
      - term: "credential"
        translation: "クレデンシャル"
      - term: "authentication mechanism"
        translation: "認証メカニズム"
      - term: "Basic authentication"
        translation: "Basic 認証"
      - term: "Bearer authentication"
        translation: "ベアラー認証"
      - term: "proactive authentication"
        translation: "プロアクティブ認証"

      # Security - Authorization
      - term: "authorization"
        translation: "認可"
      - term: "authorization code flow"
        translation: "認可コードフロー"
      - term: "authorization code flow mechanism"
        translation: "認可コードフローメカニズム"

      # Health checks (keep as-is)
      - term: "readiness probe"
        translation: "readiness probe"
      - term: "liveness probe"
        translation: "liveness probe"

      # Do not translate
      - term: "Dev Services"
        translation: "Dev Services"
      - term: "dev services"
        translation: "dev services"

  git:
    user:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
